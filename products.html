<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Discover a wide range of quality footwear at Frank Fashions">
    <meta name="author" content="Frank Fashions">
    <title>Frank Fashions - Footwear Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/tooplate-little-fashion.css" rel="stylesheet">
    <style>
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .product-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }
        .product-card:hover {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .product-image {
            height: 200px;
            object-fit: cover;
        }
        .product-details {
            padding: 15px;
        }
        .product-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        .product-price {
            font-weight: bold;
            color: #007bff;
        }
        .product-rating {
            color: #ffc107;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <!-- Navigation content (unchanged) -->
    </nav>

    <header class="bg-primary text-white text-center py-5">
        <h1>Discover Your Perfect Pair</h1>
        <p>Quality footwear for every occasion</p>
    </header>

    <main class="container my-5">
        <section class="mb-5">
            <h2 class="mb-4">Our Collection</h2>
            <div class="row">
                <div class="col-md-3">
                    <h3>Filter by:</h3>
                    <form>
                        <h4>Category</h4>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="sneakers">
                            <label class="form-check-label" for="sneakers">Sneakers</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="formal">
                            <label class="form-check-label" for="formal">Formal</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="casual">
                            <label class="form-check-label" for="casual">Casual</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="children">
                            <label class="form-check-label" for="children">Children's</label>
                        </div>

                        <h4 class="mt-4">Price Range</h4>
                        <div class="mb-3">
                            <label for="minPrice" class="form-label">Min Price</label>
                            <input type="number" class="form-control" id="minPrice" placeholder="0">
                        </div>
                        <div class="mb-3">
                            <label for="maxPrice" class="form-label">Max Price</label>
                            <input type="number" class="form-control" id="maxPrice" placeholder="1000000">
                        </div>

                        <h4 class="mt-4">Size</h4>
                        <select class="form-select" aria-label="Size select">
                            <option selected>Select size</option>
                            <option value="1">US 6</option>
                            <option value="2">US 7</option>
                            <option value="3">US 8</option>
                            <option value="4">US 9</option>
                            <option value="5">US 10</option>
                        </select>

                        <button type="submit" class="btn btn-primary mt-4">Apply Filters</button>
                    </form>
                </div>
                <div class="col-md-9">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <label for="sort-select" class="me-2">Sort by:</label>
                            <select id="sort-select" class="form-select d-inline-block w-auto">
                                <option value="popularity">Popularity</option>
                                <option value="price-low-high">Price: Low to High</option>
                                <option value="price-high-low">Price: High to Low</option>
                                <option value="newest">Newest Arrivals</option>
                            </select>
                        </div>
                        <div>
                            <button class="btn btn-outline-secondary me-2" id="grid-view"><i class="bi bi-grid"></i></button>
                            <button class="btn btn-outline-secondary" id="list-view"><i class="bi bi-list"></i></button>
                        </div>
                    </div>

                    <div class="product-grid">
                        <!-- Product Card 1 -->
                        <div class="product-card">
                            <img src="/api/placeholder/250/200" alt="Urban Sneakers" class="product-image w-100">
                            <div class="product-details">
                                <h3 class="product-title">Urban Sneakers</h3>
                                <p class="product-price">Shs.140,000</p>
                                <div class="product-rating">
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-half"></i>
                                    <span class="ms-2">4.5 (120 reviews)</span>
                                </div>
                                <button class="btn btn-primary mt-3">Add to Cart</button>
                            </div>
                        </div>

                        <!-- Product Card 2 -->
                        <div class="product-card">
                            <img src="/api/placeholder/250/200" alt="Classic Formal Shoes" class="product-image w-100">
                            <div class="product-details">
                                <h3 class="product-title">Classic Formal Shoes</h3>
                                <p class="product-price">Shs.200,000</p>
                                <div class="product-rating">
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star"></i>
                                    <span class="ms-2">4.0 (85 reviews)</span>
                                </div>
                                <button class="btn btn-primary mt-3">Add to Cart</button>
                            </div>
                        </div>

                        <!-- More product cards... -->

                    </div>

                    <nav aria-label="Product navigation" class="mt-4">
                        <ul class="pagination justify-content-center">
                            <li class="page-item disabled">
                                <a class="page-link" href="#" tabindex="-1" aria-disabled="true">Previous</a>
                            </li>
                            <li class="page-item active"><a class="page-link" href="#">1</a></li>
                            <li class="page-item"><a class="page-link" href="#">2</a></li>
                            <li class="page-item"><a class="page-link" href="#">3</a></li>
                            <li class="page-item">
                                <a class="page-link" href="#">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-dark text-white py-4">
        <!-- Footer content (unchanged) -->
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simple JavaScript for toggling between grid and list views
        document.getElementById('grid-view').addEventListener('click', function() {
            document.querySelector('.product-grid').style.display = 'grid';
        });
        document.getElementById('list-view').addEventListener('click', function() {
            document.querySelector('.product-grid').style.display = 'block';
        });
    </script>
</body>
</html>
